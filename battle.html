<script>
// ═══ STATE ═══════════════════════════════════════════
let battleGrade = 3;
let battleId = null;
let battlePlayer = 1; // 1 = host, 2 = guest
let myName = '';
let opponentName = '';
let battleChannel = null;

let battleQs = [], battleIdx = 0, battleScore = 0, battleActive = false;
let battleSec = 30, battleInterval = null;

// ─── Screen helpers ───────────────────────────────────
function showScreen(id) {
  ['screen-lobby','screen-waiting-host','screen-waiting-guest','screen-countdown','screen-playing','screen-result']
    .forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ─── Grade select ─────────────────────────────────────
function selectGrade(g) {
  battleGrade = g;
  document.querySelectorAll('.grade-btn').forEach(b => {
    b.className = 'grade-btn py-2 text-xs font-bold rounded-xl border-2 border-indigo-200 hover:border-indigo-400 transition';
  });
  const btn = document.getElementById('gb-' + g);
  btn.className = 'grade-btn py-2 text-xs font-bold rounded-xl border-2 border-indigo-600 bg-indigo-600 text-white';
}

// ─── Create room ──────────────────────────────────────
async function createRoom() {
  myName = document.getElementById('battle-name').value.trim() || (getUser()?.name || '플레이어1');
  if (!myName) { alert('이름을 입력하세요'); return; }

  try {
    const pool = CONCEPTS.filter(c => c.grade == battleGrade);
    const qs = pool.flatMap(c => c.questions.map(q => ({
      icon: c.icon, concept: c.title, q: q.q, hint: q.hint,
      options: makeOptions(q.hint, pool)
    }))).sort(() => Math.random() - .5).slice(0, 20);

    const battle = await dbCreateBattle(battleGrade, myName, qs);
    battleId = battle.id;
    battlePlayer = 1;
    document.getElementById('room-code').textContent = battle.code;
    showScreen('screen-waiting-host');

    // Subscribe to changes
    subscribeToRoom(battle.id);
  } catch (e) {
    alert('방 만들기 실패: ' + e.message);
  }
}

// ─── Show join ────────────────────────────────────────
function showJoin() {
  myName = document.getElementById('battle-name').value.trim() || (getUser()?.name || '플레이어2');
  showScreen('screen-waiting-guest');
}

// ─── Join room ────────────────────────────────────────
async function joinRoom() {
  const code = document.getElementById('join-code').value.trim();
  if (code.length !== 4) { alert('4자리 코드를 입력하세요'); return; }
  myName = myName || (getUser()?.name || '플레이어2');

  try {
    const battle = await dbJoinBattle(code, myName);
    battleId = battle.id;
    battlePlayer = 2;
    opponentName = battle.p1_name;
    battleQs = battle.questions;
    subscribeToRoom(battle.id);
    startCountdown();
  } catch (e) {
    alert('참가 실패: 코드를 확인하세요');
  }
}

// ─── Subscribe realtime ───────────────────────────────
function subscribeToRoom(id) {
  battleChannel = db.channel('battle-' + id)
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public', table: 'battles',
      filter: 'id=eq.' + id
    }, payload => {
      const row = payload.new;

      // Guest가 들어오면 host도 카운트다운 시작
      if (battlePlayer === 1 && row.status === 'playing' && row.p2_name) {
        opponentName = row.p2_name;
        battleQs = row.questions;
        startCountdown();
      }

      // 상대 점수 업데이트
      const oppScore = battlePlayer === 1 ? row.p2_score : row.p1_score;
      updateOpponentScore(oppScore);

      // 둘 다 done 처리
      if (row.status === 'done') showResult(row);
    })
    .subscribe();
}

// ─── Countdown ────────────────────────────────────────
function startCountdown() {
  document.getElementById('cd-opponent').textContent = opponentName;
  showScreen('screen-countdown');
  let n = 3;
  const el = document.getElementById('countdown-num');
  el.textContent = n;
  const t = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(t);
      startBattle();
    } else {
      el.style.animation = 'none';
      el.offsetHeight; // reflow
      el.style.animation = '';
      el.textContent = n;
    }
  }, 1000);
}

// ─── Battle start ─────────────────────────────────────
function startBattle() {
  battleIdx = 0; battleScore = 0; battleActive = true;
  document.getElementById('p1-name-display').textContent = myName;
  document.getElementById('p2-name-display').textContent = opponentName;
  updateScoreUI();
  showScreen('screen-playing');

  battleSec = 30;
  clearInterval(battleInterval);
  battleInterval = setInterval(() => {
    battleSec--;
    document.getElementById('battle-sec').textContent = battleSec;
    document.getElementById('battle-timer-bar').style.width = (battleSec / 30 * 100) + '%';
    if (battleSec <= 0) { clearInterval(battleInterval); endBattle(); }
  }, 1000);

  renderBattleQ();
}

// ─── Question helpers ─────────────────────────────────
function cleanHint(h) { return h.replace(/\.\.\./g, '').replace(/…/g, '').trim().split('(')[0].trim(); }

function makeOptions(correctHint, pool) {
  const correct = cleanHint(correctHint);
  const others = pool.flatMap(c => c.questions.map(q => cleanHint(q.hint)))
    .filter(h => h && h !== correct);
  return [correct, ...others.sort(() => Math.random() - .5).slice(0, 3)].sort(() => Math.random() - .5);
}

// ─── Render question ──────────────────────────────────
function renderBattleQ() {
  if (battleIdx >= battleQs.length || !battleActive) return;
  const q = battleQs[battleIdx];
  battleActive = true;

  document.getElementById('battle-q-num').textContent = 'Q' + (battleIdx + 1);
  document.getElementById('battle-concept').textContent = q.icon + ' ' + q.concept;
  document.getElementById('battle-question').textContent = q.q;
  document.getElementById('battle-feedback').classList.add('hidden');

  document.getElementById('battle-options').innerHTML = q.options.map((opt, i) => `
    <button onclick="battleAnswer(${i})" class="quiz-opt rounded-2xl px-4 py-3 text-sm font-medium text-left text-gray-800 shadow-sm">
      <span class="font-black text-primary mr-2">${['①','②','③','④'][i]}</span>${opt}
    </button>
  `).join('');
}

// ─── Answer ───────────────────────────────────────────
function battleAnswer(i) {
  if (!battleActive) return;
  battleActive = false;
  const q = battleQs[battleIdx];
  const correct = cleanHint(q.hint);
  const isRight = q.options[i] === correct;

  document.querySelectorAll('.quiz-opt').forEach((btn, j) => {
    if (q.options[j] === correct) btn.classList.add('correct');
    else if (j === i && !isRight) btn.classList.add('wrong');
  });

  const fb = document.getElementById('battle-feedback');
  fb.classList.remove('hidden');
  if (isRight) {
    battleScore += 10;
    fb.className = 'text-center text-sm font-bold py-2 rounded-2xl bg-green-100 text-green-700';
    fb.textContent = '✅ 정답! +10점';
    updateScoreUI();
    dbUpdateBattleScore(battleId, battlePlayer, battleScore);
  } else {
    fb.className = 'text-center text-sm font-bold py-2 rounded-2xl bg-red-100 text-red-700';
    fb.textContent = '❌ 오답! 정답: ' + correct;
  }
  battleIdx++;
  setTimeout(() => { battleActive = true; renderBattleQ(); }, 900);
}

// ─── Score UI ─────────────────────────────────────────
function updateScoreUI() {
  const myEl = battlePlayer === 1 ? 'p1-score-display' : 'p2-score-display';
  document.getElementById(myEl).textContent = battleScore;
  const myBar = battlePlayer === 1 ? 'p1-score-bar' : 'p2-score-bar';
  document.getElementById(myBar).style.width = Math.min(battleScore, 200) / 2 + '%';
}

function updateOpponentScore(score) {
  const el = battlePlayer === 1 ? 'p2-score-display' : 'p1-score-display';
  const bar = battlePlayer === 1 ? 'p2-score-bar' : 'p1-score-bar';
  document.getElementById(el).textContent = score;
  document.getElementById(bar).style.width = Math.min(score, 200) / 2 + '%';
}

// ─── End battle ───────────────────────────────────────
async function endBattle() {
  battleActive = false;
  clearInterval(battleInterval);
  await dbUpdateBattleScore(battleId, battlePlayer, battleScore);
  if (battlePlayer === 1) await dbEndBattle(battleId);

  // Fetch final scores
  setTimeout(async () => {
    const { data } = await db.from('battles').select('*').eq('id', battleId).single();
    if (data) showResult(data);
  }, 1500);
}

// ─── Show result ──────────────────────────────────────
function showResult(row) {
  clearInterval(battleInterval);
  if (battleChannel) battleChannel.unsubscribe();
  showScreen('screen-result');

  const p1s = row.p1_score || 0;
  const p2s = row.p2_score || 0;
  const iWon = (battlePlayer === 1 && p1s >= p2s) || (battlePlayer === 2 && p2s > p1s);
  const tied = p1s === p2s;

  document.getElementById('result-emoji').textContent  = tied ? '🤝' : iWon ? '🏆' : '😢';
  document.getElementById('result-title').textContent  = tied ? '무승부!' : iWon ? '승리!' : '아쉬워요!';
  document.getElementById('result-desc').textContent   = tied ? '동점! 다시 도전해봐요' : iWon ? '잘했어요! 친구를 이겼어요 🎉' : '다음엔 꼭 이길 수 있어요!';
  document.getElementById('result-p1-name').textContent = row.p1_name || 'P1';
  document.getElementById('result-p2-name').textContent = row.p2_name || 'P2';
  document.getElementById('result-p1-score').textContent = p1s;
  document.getElementById('result-p2-score').textContent = p2s;

  const winnerPlayer = p1s >= p2s ? 1 : 2;
  const winEl = winnerPlayer === 1 ? 'result-p1' : 'result-p2';
  const loseEl = winnerPlayer === 1 ? 'result-p2' : 'result-p1';
  document.getElementById(winEl).className = 'rounded-xl p-4 border-2 bg-yellow-50 border-yellow-300';
  document.getElementById(loseEl).className = 'rounded-xl p-4 border-2 bg-gray-50 border-gray-200';

  if (iWon && !tied) launchParticles(20, ['🌟','⭐','🎊','🏆']);
}

function launchParticles(count, emojis) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (Math.random() * 95) + 'vw';
    el.style.top = '-40px';
    el.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }
}

function cancelBattle() {
  if (battleChannel) battleChannel.unsubscribe();
  if (battleId) db.from('battles').delete().eq('id', battleId);
  showScreen('screen-lobby');
}

function rematch() {
  if (battleChannel) battleChannel.unsubscribe();
  battleId = null; battleChannel = null;
  showScreen('screen-lobby');
}

document.addEventListener('DOMContentLoaded', () => {
  const user = getUser();
  if (user) document.getElementById('battle-name').value = user.name;
  selectGrade(3);
});
</script>
