@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{font-family:'Noto Sans KR',sans-serif;}
body{background:#EDEEFF;background-image:radial-gradient(ellipse 80% 60% at 0% 0%,rgba(79,70,229,.08) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 100% 100%,rgba(124,58,237,.07) 0%,transparent 55%);min-height:100vh;}
.gradient-bg{background:linear-gradient(135deg,#4338CA 0%,#7C3AED 55%,#DB2777 100%);}
.card-hover{transition:all .3s cubic-bezier(.4,0,.2,1);border:2px solid rgba(99,91,255,.2);background:white;}
.card-hover:hover{transform:translateY(-5px);box-shadow:0 24px 48px rgba(79,70,229,.2),0 0 0 1px rgba(79,70,229,.12);border-color:rgba(79,70,229,.3);}
.progress-bar{background:linear-gradient(90deg,#4F46E5,#7C3AED,#EC4899);transition:width .8s ease;}
.fade-in{animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-overlay{background:rgba(15,10,40,.65);backdrop-filter:blur(8px);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:linear-gradient(#4F46E5,#7C3AED);border-radius:3px;}
nav{box-shadow:0 4px 24px rgba(79,70,229,.4)!important;border-bottom:none!important;}
.step-active{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:white;box-shadow:0 6px 16px rgba(79,70,229,.45);}
.step-done{background:linear-gradient(135deg,#059669,#10B981);color:white;}
.question-card{border-left:4px solid #6366F1;background:white;}
.type-badge{font-size:.65rem;padding:2px 8px;border-radius:999px;font-weight:600;}
.ans-input{outline:none;transition:all .2s;}
.ans-input:focus{border-color:#6366F1!important;box-shadow:0 0 0 3px rgba(99,102,241,.12);background:white!important;}
.result-correct{background:linear-gradient(to bottom right,#F0FDF4,#ECFDF5);border:2px solid #86EFAC;border-left:4px solid #22C55E;}
.result-partial{background:linear-gradient(to bottom right,#FFFBEB,#FEF9C3);border:2px solid #FCD34D;border-left:4px solid #F59E0B;}
.result-wrong{background:linear-gradient(to bottom right,#FFF1F2,#FFF0F0);border:2px solid #FCA5A5;border-left:4px solid #EF4444;}
@keyframes particleFall {
  0%{opacity:1;transform:translateY(0) rotate(0deg);}
  100%{opacity:0;transform:translateY(120px) rotate(360deg);}
}
@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%,60%{transform:translateX(-6px);}
  40%,80%{transform:translateX(6px);}
}
</style>

<script>
const STEPS = [
  { name:'Learn',    icon:'📖', color:'text-primary',    bg:'bg-indigo-50' },
  { name:'Practice', icon:'✏️', color:'text-purple-600', bg:'bg-purple-50' },
  { name:'Explain',  icon:'💬', color:'text-pink-600',   bg:'bg-pink-50'   },
  { name:'Repeat',   icon:'🔄', color:'text-amber-600',  bg:'bg-amber-50'  },
  { name:'Answer',   icon:'❓', color:'text-green-600',  bg:'bg-green-50'  },
  { name:'Solve',    icon:'✅', color:'text-blue-600',   bg:'bg-blue-50'   },
];

// 단계별 테마 색상
const STEP_THEMES = [
  { border:'border-t-4 border-t-indigo-400', label:'indigo' },
  { border:'border-t-4 border-t-purple-400', label:'purple' },
  { border:'border-t-4 border-t-pink-400',   label:'pink'   },
  { border:'border-t-4 border-t-amber-400',  label:'amber'  },
  { border:'border-t-4 border-t-green-400',  label:'green'  },
  { border:'border-t-4 border-t-cyan-400',   label:'cyan'   },
];

// 유형별 취약점 팁
const TYPE_TIPS = {
  '정의': {
    tip: '개념의 핵심 키워드를 먼저 찾고 "~은 ~이다" 형식으로 한 문장에 정리하는 연습을 하세요.',
    example: '예) "덧셈이란 두 수를 합치는 것이다" 처럼 명확하게 쓰기'
  },
  '구조': {
    tip: '대상을 이루는 요소들을 하나씩 나열하세요. "~은 A, B, C로 이루어진다" 형식이 도움됩니다.',
    example: '예) 삼각형은 꼭짓점 3개 · 변 3개 · 각 3개로 이루어진다.'
  },
  '계산': {
    tip: '계산 과정을 단계별로 적는 습관을 들이세요. 각 단계에서 무엇을 했는지 말로도 써보세요.',
    example: '예) 3×4 → 3을 4번 더함 → 3+3+3+3 = 12'
  },
  '개념': {
    tip: '두 개념의 공통점과 차이점을 비교하는 표를 만들어보세요. 차이점에 집중하면 개념이 선명해집니다.',
    example: '예) 직선(끝 없음) vs 선분(끝점 2개 있음) — 표로 비교'
  },
  '적용': {
    tip: '실생활에서 이 개념이 쓰이는 곳 3가지를 먼저 떠올리고, 가장 쉬운 예부터 설명해보세요.',
    example: '예) 길이 재기 → 책상 길이, 키 재기, 창문 크기 측정'
  },
  '사고': {
    tip: '"왜 그럴까?", "항상 그럴까?", "반대는?" 세 질문을 스스로 던져보는 습관을 기르세요.',
    example: '예) 분모가 클수록 조각이 작아지는 이유 → 같은 전체를 더 많이 나누므로'
  }
};

// 유형별 배경색
const TYPE_BG = {
  '정의': 'bg-blue-50',
  '구조': 'bg-purple-50',
  '계산': 'bg-green-50',
  '개념': 'bg-amber-50',
  '적용': 'bg-pink-50',
  '사고': 'bg-cyan-50',
};

let lesson = null;
let step = 0;
let answersData = null;

function getParam(key) {
  return new URLSearchParams(location.search).get(key);
}

function init() {
  const id = parseInt(getParam('id'));
  lesson = CONCEPTS.find(c => c.id === id);
  if (!lesson) {
    document.body.innerHTML += '<p class="p-8 text-red-500">개념을 찾을 수 없습니다. <a href="learn.html" class="underline">목록으로</a></p>';
    return;
  }
  document.title = lesson.title + ' — 질문수학';
  document.getElementById('lesson-grade-badge').textContent = lesson.grade + '학년';
  document.getElementById('lesson-topic-badge').textContent = lesson.topic;
  document.getElementById('lesson-title').textContent = lesson.title;
  document.getElementById('lesson-desc').textContent = lesson.desc;
  renderIndicators();
  renderContent();
  initXPBar();
}

function renderIndicators() {
  document.getElementById('step-indicators').innerHTML = STEPS.map((s, i) => `
    <button onclick="goStep(${i})" class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-medium transition whitespace-nowrap
      ${i === step ? 'step-active' : i < step ? 'step-done' : 'bg-gray-100 border-2 border-gray-200 text-gray-400 hover:border-primary hover:text-primary shadow-sm'}">
      <span>${s.icon}</span><span class="hidden sm:inline">${s.name}</span>
    </button>
  `).join('');
  document.getElementById('step-counter').textContent = `${step + 1} / ${STEPS.length}`;
  document.getElementById('btn-prev').disabled = step === 0;
  document.getElementById('btn-next').textContent = step === STEPS.length - 1 ? '완료 ✓' : '다음 →';
}

// ── Answer 단계: 답변 입력 폼 ─────────────────────────────
function renderAnswerInput() {
  return `<div class="space-y-4">
    <div class="flex items-center gap-2 text-green-600 font-bold text-lg">❓ Answer — 질문 답하기</div>
    <div class="bg-green-50 border-2 border-green-200 rounded-xl p-4 text-sm text-green-800 leading-relaxed">
      💡 5개 질문에 모두 답한 후 <strong>제출하기</strong>를 누르면 <strong>채점 · 피드백 · 취약점 분석</strong>을 받을 수 있어요.
      <br><span class="text-xs text-green-600 mt-1 block">Enter 키로 다음 문항으로 이동할 수 있어요.</span>
    </div>
    <div class="space-y-3">
      ${lesson.questions.map((q, i) => `
        <div class="question-card rounded-xl p-4 border border-gray-100 shadow-sm ${TYPE_BG[q.type] || 'bg-white'}">
          <div class="flex items-center gap-2 mb-2">
            <span class="type-badge bg-green-100 text-green-700">${q.type}</span>
            <span class="text-xs text-gray-500 font-medium">Q${i + 1}</span>
          </div>
          <div class="font-medium text-gray-900 mb-3">${q.q}</div>
          <input type="text" id="ans_${i}" placeholder="답을 입력하세요..."
            class="ans-input w-full border-2 border-indigo-200 focus:border-indigo-500 rounded-xl px-3 py-2.5 text-sm bg-white"
            onkeydown="if(event.key==='Enter'){event.preventDefault();var nx=document.getElementById('ans_${i+1}');if(nx)nx.focus();}">
        </div>
      `).join('')}
    </div>
    <button onclick="submitAnswers()"
      class="w-full gradient-bg text-white font-bold py-3 rounded-2xl hover:shadow-lg transition text-base shadow-lg mt-2">
      답변 제출하기 →
    </button>
  </div>`;
}

// ── 답변 평가 (키워드 매칭) ────────────────────────────────
function evaluateAnswer(userAns, hint) {
  if (!userAns || userAns.trim().length < 1) return 'wrong';
  const clean = hint.replace(/\.\.\./g, '').toLowerCase();
  const terms = clean.split(/[,·\s\/\(\)\[\]]+/).map(t => t.trim()).filter(t => t.length > 1);
  const ans = userAns.toLowerCase();
  const matches = terms.filter(t => ans.includes(t));
  if (matches.length === 0) return 'wrong';
  if (terms.length <= 2) return matches.length >= 1 ? 'correct' : 'wrong';
  return matches.length >= 2 ? 'correct' : 'partial';
}

// ── 제출 처리 ────────────────────────────────────────────
function submitAnswers() {
  answersData = lesson.questions.map((q, i) => {
    const input = document.getElementById(`ans_${i}`);
    const userAns = input ? input.value.trim() : '';
    return { q, userAns, result: evaluateAnswer(userAns, q.hint) };
  });

  const correct = answersData.filter(a => a.result === 'correct').length;
  const partial  = answersData.filter(a => a.result === 'partial').length;
  const wrong    = answersData.filter(a => a.result === 'wrong').length;
  const score    = correct + partial * 0.5;
  const weakTypes = [...new Set(answersData.filter(a => a.result !== 'correct').map(a => a.q.type))];

  const el = document.getElementById('step-content');
  el.className = 'bg-white rounded-2xl p-6 shadow-md border-2 border-indigo-200 min-h-64 fade-in ' + STEP_THEMES[step].border;
  el.innerHTML = buildFeedbackHTML(correct, partial, wrong, score, weakTypes);
}

// ── 파티클 애니메이션 ─────────────────────────────────────
function launchParticles(count, emoji) {
  for(let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.textContent = emoji;
      p.style.cssText = `position:fixed;left:${Math.random()*100}%;top:${Math.random()*50+20}%;font-size:${Math.random()*20+16}px;pointer-events:none;z-index:9999;animation:particleFall 1.5s ease forwards;`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1500);
    }, i * 80);
  }
}

// ── 별점/XP 계산 ──────────────────────────────────────────
function calcStarsAndXP(correct, partial) {
  const totalScore = correct + partial * 0.5;
  let stars, xp;
  if (correct === 5) {
    stars = 3; xp = 150;
  } else if (correct === 4 || totalScore >= 5) {
    stars = 2; xp = 100;
  } else {
    stars = 1; xp = 50;
  }
  return { stars, xp };
}

// ── XP 바 초기화 ──────────────────────────────────────────
function initXPBar() {
  const xp = parseInt(localStorage.getItem('qmath_xp') || '0');
  const level = Math.floor(xp / 500) + 1;
  const xpInLevel = xp % 500;
  document.getElementById('xp-value').textContent = `Lv.${level} (${xpInLevel}/500)`;
  document.getElementById('xp-fill').style.width = (xpInLevel / 5) + '%';

  const stars = JSON.parse(localStorage.getItem('qmath_stars') || '{}');
  const lessonStars = stars[lesson?.id];
  if (lessonStars) {
    document.getElementById('prev-stars').textContent = '이전: ' + '⭐'.repeat(lessonStars);
  }
}

// ── 피드백 HTML 생성 ──────────────────────────────────────
function buildFeedbackHTML(correct, partial, wrong, score, weakTypes) {
  const scoreGrad =
    score >= 4.5 ? 'from-green-500 to-emerald-500' :
    score >= 3   ? 'from-blue-500 to-indigo-500'   :
    score >= 1.5 ? 'from-amber-400 to-orange-400'  :
                   'from-red-400 to-rose-500';

  const scoreMsg =
    score >= 4.5 ? '완벽해요! 개념을 완전히 이해했습니다 🌟' :
    score >= 3   ? '잘했어요! 조금만 더 다듬으면 완벽해요 👍' :
    score >= 1.5 ? '기초는 있어요. 취약 부분을 집중 보완하세요 💪' :
                   '다시 한 번 개념을 읽고 도전해보세요 📖';

  // 별점/XP 계산 및 저장
  const { stars, xp } = calcStarsAndXP(correct, partial);
  const starsText = '⭐'.repeat(stars);
  const prevXP = parseInt(localStorage.getItem('qmath_xp') || '0');
  localStorage.setItem('qmath_xp', String(prevXP + xp));
  const starsData = JSON.parse(localStorage.getItem('qmath_stars') || '{}');
  starsData[lesson.id] = stars;
  localStorage.setItem('qmath_stars', JSON.stringify(starsData));

  // 파티클 실행
  if (correct === 5) {
    launchParticles(20, '🎊');
  } else if (correct >= 3) {
    launchParticles(10, '⭐');
  }

  const rIcon  = r => r === 'correct' ? '✅' : r === 'partial' ? '⚠️' : '❌';
  const rLabel = r => r === 'correct' ? '정확' : r === 'partial' ? '부분 정답' : '오답';
  const rClass = r => r === 'correct' ? 'result-correct' : r === 'partial' ? 'result-partial' : 'result-wrong';

  const qCards = answersData.map((a, i) => `
    <div class="${rClass(a.result)} rounded-xl p-4">
      <div class="flex items-center justify-between gap-2 mb-2">
        <div class="flex items-center gap-2 min-w-0">
          <span class="type-badge bg-white/80 text-gray-700 shrink-0">${a.q.type}</span>
          <span class="font-medium text-sm text-gray-900 line-clamp-1">Q${i+1}. ${a.q.q}</span>
        </div>
        <div class="flex items-center gap-1 shrink-0 ml-2">
          <span class="text-xs font-bold ${a.result==='correct'?'text-green-700':a.result==='partial'?'text-amber-700':'text-red-700'}">${rLabel(a.result)}</span>
          <span>${rIcon(a.result)}</span>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2 text-xs">
        <div class="bg-white/70 rounded-lg p-2.5 border border-white">
          <div class="text-gray-500 mb-1 font-medium">내 답변</div>
          <div class="${a.userAns ? 'text-gray-900' : 'text-gray-400 italic'}">${a.userAns || '(미입력)'}</div>
        </div>
        <div class="bg-white/70 rounded-lg p-2.5 border border-white">
          <div class="text-gray-500 mb-1 font-medium">핵심 답안</div>
          <div class="text-gray-900 font-semibold">${a.q.hint.replace(/\.\.\./g, '')}</div>
        </div>
      </div>
    </div>
  `).join('');

  const weakSection = weakTypes.length > 0 ? `
    <div class="bg-amber-50 border-2 border-amber-300 rounded-2xl p-5">
      <h4 class="font-black text-amber-900 mb-1 text-base">📊 취약점 분석</h4>
      <p class="text-sm text-amber-800 mb-4">
        <strong class="font-bold">${weakTypes.map(t => `[${t}]`).join(' · ')} 유형</strong>에서 보완이 필요합니다.
      </p>
      <div class="space-y-3">
        ${weakTypes.map(type => {
          const tips = TYPE_TIPS[type] || { tip: '관련 개념을 다시 읽어보세요.', example: '' };
          return `
          <div class="bg-white rounded-xl p-4 border border-amber-100 shadow-sm">
            <div class="font-bold text-gray-900 mb-1.5 text-sm">📌 ${type} 유형 — 이렇게 연습하세요</div>
            <p class="text-sm text-gray-700 leading-relaxed mb-2">${tips.tip}</p>
            ${tips.example ? `<div class="bg-amber-50 border border-amber-100 rounded-lg px-3 py-2 text-xs text-amber-800">${tips.example}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
  ` : `
    <div class="bg-green-50 border-2 border-green-300 rounded-2xl p-5 text-center">
      <div class="text-4xl mb-2">🌟</div>
      <h4 class="font-black text-green-800 mb-1">모든 유형을 완벽히 이해했어요!</h4>
      <p class="text-sm text-green-700">다음 단계로 넘어가서 문제를 풀어보세요.</p>
    </div>
  `;

  return `<div class="space-y-5 fade-in">
    <!-- 점수 카드 -->
    <div class="bg-gradient-to-r ${scoreGrad} rounded-2xl p-6 text-white text-center shadow-lg">
      <div class="text-5xl font-black mb-1">${correct}<span class="text-2xl font-medium opacity-80"> / 5</span></div>
      <div class="text-base font-semibold mb-3 opacity-95">${scoreMsg}</div>
      <div class="flex justify-center gap-6 text-sm bg-white/15 rounded-xl py-2.5">
        <span>✅ 정확 <strong>${correct}개</strong></span>
        <span>⚠️ 부분 <strong>${partial}개</strong></span>
        <span>❌ 오답 <strong>${wrong}개</strong></span>
      </div>
      <div class="flex justify-center gap-4 mt-3">
        <div class="bg-white/20 rounded-xl px-4 py-2">
          <div class="text-3xl">${starsText}</div>
          <div class="text-xs opacity-80">별점</div>
        </div>
        <div class="bg-white/20 rounded-xl px-4 py-2">
          <div class="text-2xl font-black">+${xp} XP</div>
          <div class="text-xs opacity-80">획득</div>
        </div>
      </div>
    </div>

    <!-- 문항별 결과 -->
    <div>
      <h4 class="font-bold text-gray-900 mb-3 text-sm">문항별 결과</h4>
      <div class="space-y-2.5">${qCards}</div>
    </div>

    <!-- 취약점 분석 & 팁 -->
    ${weakSection}

    <!-- 버튼 -->
    <div class="flex gap-3 pt-1">
      <button onclick="retryAnswers()"
        class="flex-1 bg-white border-2 border-indigo-200 text-gray-700 font-medium py-3 rounded-2xl hover:border-primary hover:text-primary transition shadow-sm">
        🔄 다시 풀기
      </button>
      <button onclick="nextStep()"
        class="flex-1 gradient-bg text-white font-bold py-3 rounded-2xl hover:shadow-lg transition shadow-md">
        다음 단계 →
      </button>
    </div>
  </div>`;
}

function retryAnswers() {
  answersData = null;
  const el = document.getElementById('step-content');
  el.className = 'bg-white rounded-2xl p-6 shadow-md border-2 border-green-300 border-t-4 border-t-green-400 min-h-64 fade-in';
  el.innerHTML = renderAnswerInput();
}

// ── 단계별 콘텐츠 렌더링 ────────────────────────────────
function renderContent() {
  const el = document.getElementById('step-content');
  const theme = STEP_THEMES[step];
  el.className = `bg-white rounded-2xl p-6 shadow-md border-2 border-indigo-200 ${theme.border} min-h-64 fade-in`;
  const q = lesson.questions[Math.min(step, lesson.questions.length - 1)];

  if (step === 4) {
    el.innerHTML = answersData
      ? buildFeedbackHTML(
          answersData.filter(a => a.result==='correct').length,
          answersData.filter(a => a.result==='partial').length,
          answersData.filter(a => a.result==='wrong').length,
          answersData.filter(a => a.result==='correct').length + answersData.filter(a => a.result==='partial').length * 0.5,
          [...new Set(answersData.filter(a => a.result!=='correct').map(a => a.q.type))]
        )
      : renderAnswerInput();
    return;
  }

  const contents = {
    0: `<div class="space-y-4">
      <div class="flex items-center gap-2 text-primary font-bold text-lg">📖 Learn — 개념 학습</div>
      <div class="bg-indigo-50 border-2 border-indigo-200 rounded-xl p-5 text-gray-800 leading-relaxed text-sm">${lesson.learn}</div>
      <div class="border-2 border-indigo-200 rounded-xl p-5 text-center bg-white">
        <div class="text-xs text-gray-500 mb-2 font-medium">오늘의 핵심 개념</div>
        <div class="font-black text-2xl text-primary">${lesson.title}</div>
      </div>
      <p class="text-sm text-gray-600">개념을 충분히 읽고 이해한 후 다음 단계로 진행하세요.</p>
    </div>`,

    1: `<div class="space-y-4">
      <div class="flex items-center gap-2 text-purple-600 font-bold text-lg">✏️ Practice — 워크북</div>
      <p class="text-gray-600 text-sm">배운 개념을 자신의 말로 정리해 보세요.</p>
      <textarea id="practice-text" rows="5" placeholder="'${lesson.title}'을(를) 자신의 말로 설명해 보세요..."
        class="w-full border-2 border-purple-200 rounded-xl p-4 text-sm focus:outline-none focus:border-purple-400 resize-none transition bg-gray-50 focus:bg-white"></textarea>
      <div class="bg-purple-50 border-2 border-purple-200 rounded-xl p-3 text-xs text-purple-800">💡 완벽하지 않아도 됩니다. 지금 알고 있는 것을 자유롭게 써보세요.</div>
    </div>`,

    2: `<div class="space-y-4">
      <div class="flex items-center gap-2 text-pink-600 font-bold text-lg">💬 Explain — 설명하기</div>
      <div class="bg-pink-50 border-2 border-pink-200 rounded-xl p-4 text-sm text-pink-800">친구나 가족에게 "<strong>${lesson.title}</strong>"을 설명한다고 생각하고 말해보세요.</div>
      <div class="question-card rounded-xl p-4 border border-gray-100 shadow-sm ${TYPE_BG[q?.type] || 'bg-white'}">
        <span class="type-badge bg-pink-100 text-pink-700">${q?.type || '설명'} 질문</span>
        <div class="font-medium text-gray-900 mt-2 mb-3">${q?.q || lesson.title + '을 설명해보세요.'}</div>
        <textarea rows="3" id="explain-text" placeholder="설명을 입력하세요..."
          class="w-full border-2 border-pink-200 rounded-lg p-3 text-sm focus:outline-none focus:border-pink-400 resize-none transition"></textarea>
      </div>
    </div>`,

    3: `<div class="space-y-4">
      <div class="flex items-center gap-2 text-amber-600 font-bold text-lg">🔄 Repeat — 반복 학습</div>
      <p class="text-gray-600 text-sm">개념을 다양한 질문으로 반복하며 완전히 자신의 것으로 만드세요.</p>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        ${lesson.questions.map(q => `
          <div class="bg-white border-2 border-amber-200 rounded-xl p-3 hover:border-amber-400 transition shadow-sm ${TYPE_BG[q.type] || ''}">
            <span class="type-badge bg-amber-100 text-amber-700">${q.type}</span>
            <div class="text-sm text-gray-900 mt-2 font-medium">${q.q}</div>
            <div class="text-xs text-gray-500 mt-2 italic border-t border-gray-100 pt-2">힌트: ${q.hint}</div>
          </div>
        `).join('')}
      </div>
    </div>`,

    5: `<div class="space-y-4">
      <div class="flex items-center gap-2 text-blue-600 font-bold text-lg">✅ Solve — 문제 해결</div>
      <div class="bg-cyan-50 border-2 border-cyan-200 rounded-xl p-4 text-sm text-blue-800">개념을 활용하여 다음 문제를 풀어보세요.</div>
      <div class="space-y-4">
        <div class="bg-white border-2 border-cyan-200 rounded-xl p-5 shadow-sm">
          <div class="font-bold mb-3 text-gray-900">문제 1: <span class="text-primary">${lesson.title}</span>의 정의로 옳은 것은?</div>
          <div class="space-y-2 text-sm">
            ${['기본 정의 — ' + lesson.learn.slice(0, 35) + '...', '잘못된 정의 — 암기가 중요하다', '부분 정의 — 공식이 핵심이다', '관계없음 — 계산만 잘하면 된다'].map((opt, i) => `
              <label class="flex items-center gap-2 p-2.5 rounded-xl cursor-pointer border-2 border-transparent hover:border-primary/30 hover:bg-indigo-50 transition">
                <input type="radio" name="solve_q1" value="${i}" class="accent-primary"> <span class="text-gray-800">${opt}</span>
              </label>
            `).join('')}
          </div>
        </div>
        <div class="bg-white border-2 border-cyan-200 rounded-xl p-5 shadow-sm">
          <div class="font-bold mb-2 text-gray-900">문제 2: ${lesson.questions[0]?.q}</div>
          <textarea rows="2" placeholder="답을 써보세요..."
            class="w-full border-2 border-cyan-200 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-400 resize-none transition"></textarea>
        </div>
      </div>
      <button onclick="completeLesson()"
        class="w-full bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold py-3 rounded-2xl hover:shadow-lg transition shadow-md text-base">
        학습 완료! 🎉
      </button>
    </div>`
  };

  el.innerHTML = contents[step] || '';
}

function goStep(i) {
  if (i !== 4) answersData = null;
  step = i;
  renderIndicators();
  renderContent();
}
function nextStep() {
  if (step < STEPS.length - 1) {
    if (step !== 4) answersData = null;
    step++;
    renderIndicators();
    renderContent();
  } else {
    completeLesson();
  }
}
function prevStep() {
  if (step > 0) {
    if (step !== 4) answersData = null;
    step--;
    renderIndicators();
    renderContent();
  }
}

function completeLesson() {
  document.getElementById('complete-msg').textContent = '"' + lesson.title + '" 학습을 모두 완료했습니다! 훌륭합니다.';

  // 별점/XP 가져와서 배너에 표시
  const starsData = JSON.parse(localStorage.getItem('qmath_stars') || '{}');
  const lessonStars = starsData[lesson.id] || 3;
  const xpMap = { 3: 150, 2: 100, 1: 50 };
  const earnedXP = xpMap[lessonStars] || 150;
  document.getElementById('complete-stars').textContent = '⭐'.repeat(lessonStars);
  document.getElementById('complete-xp').textContent = '+' + earnedXP;

  // 완료 레슨 목록 업데이트 (중복 제거)
  const completedKey = 'qmath_completed_lessons';
  const completed = JSON.parse(localStorage.getItem(completedKey) || '[]');
  if (!completed.includes(lesson.id)) {
    completed.push(lesson.id);
    localStorage.setItem(completedKey, JSON.stringify(completed));
  }

  document.getElementById('complete-banner').classList.remove('hidden');

  // 완료 배너 confetti 파티클
  launchParticles(25, ['🌟','⭐','✨'][Math.floor(Math.random()*3)]);

  const key = 'qmath_progress';
  const prog = JSON.parse(localStorage.getItem(key) || '{}');
  prog[lesson.id] = 6;
  localStorage.setItem(key, JSON.stringify(prog));
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
