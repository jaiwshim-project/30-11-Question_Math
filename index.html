<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심재우 · AI 플랫폼 프로젝트 인덱스</title>
<style>
  :root {
    --bg:     #eef2f7;
    --bg2:    #ffffff;
    --bg3:    #f0f4f8;
    --border: #b0bec5;
    --text:   #0d1b2a;
    --text2:  #37474f;
    --blue:   #1565c0;
    --blue2:  #1976d2;
    --green:  #2e7d32;
    --purple: #6a1b9a;
    --orange: #e65100;
    --red:    #c62828;
    --pink:   #ad1457;
    --teal:   #00695c;
    --gold:   #f57f17;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Malgun Gothic','맑은 고딕',sans-serif; min-height:100vh; }

  /* ── 헤더 ── */
  .header {
    background: linear-gradient(135deg, #0f2744 0%, #1a365d 100%);
    padding: 20px 40px 16px;
    border-bottom: 1px solid #1e3a5f;
    position: sticky; top:0; z-index:100;
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .header h1 { font-size:1.25rem; font-weight:800; color:#fff; }
  .header h1 span { color:#fcd34d; }
  .stat-chips { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15);
          padding:3px 12px; border-radius:20px; font-size:0.75rem; color:rgba(255,255,255,0.8); }
  .chip b { color:#fff; }

  /* ── 검색·필터 바 (sticky) ── */
  .toolbar {
    padding: 12px 40px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex; gap:10px; align-items:center; flex-wrap:wrap;
    position: sticky; z-index:99;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .search-wrap { position:relative; width:280px; flex-shrink:0; }
  .search-wrap > svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text2); pointer-events:none; }
  #search { width:100%; background:var(--bg3); border:1px solid var(--border);
            color:var(--text); padding:8px 36px 8px 34px; border-radius:7px;
            font-size:0.85rem; outline:none; font-family:inherit; }
  #search:focus { border-color:var(--blue2); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
  #search::placeholder { color:#94a3b8; }

  /* 드롭다운 버튼 */
  .search-dd-btn {
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; color:var(--text2);
    font-size:0.8rem; padding:4px 6px; border-radius:4px; line-height:1;
    transition:all .15s;
  }
  .search-dd-btn:hover { background:var(--border); color:var(--text); }
  .search-dropdown {
    display:none; position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:300;
    background:#fff; border:1px solid var(--border); border-radius:8px;
    box-shadow:0 8px 24px rgba(0,0,0,0.12); max-height:320px; overflow-y:auto;
  }
  .search-dropdown.show { display:block; }
  .dd-section { padding:6px 0; border-bottom:1px solid var(--border); }
  .dd-section:last-child { border-bottom:none; }
  .dd-section-title { padding:4px 12px; font-size:0.68rem; font-weight:700; color:#94a3b8; letter-spacing:1px; text-transform:uppercase; }
  .dd-item {
    padding:7px 14px; font-size:0.82rem; color:var(--text); cursor:pointer;
    display:flex; align-items:center; gap:8px; transition:background .1s;
  }
  .dd-item:hover { background:var(--bg3); color:var(--blue); }
  .dd-item .dd-num { font-size:0.7rem; color:var(--gold); font-weight:700; min-width:32px; }
  .dd-item.pinned { font-weight:700; color:#1565c0; background:#f0f7ff; }
  .dd-item.pinned:hover { background:#dbeafe; }

  .filter-tabs { display:flex; gap:5px; flex-wrap:wrap; }
  .tab { padding:5px 12px; border-radius:6px; border:1.5px solid #90a4ae;
         background:#fff; color:#37474f; font-size:0.78rem; font-weight:600;
         cursor:pointer; transition:all .2s; font-family:inherit; white-space:nowrap; }
  .tab:hover { border-color:var(--blue2); color:var(--blue); background:#e3f2fd; }
  .tab.active { background:var(--blue); border-color:var(--blue); color:#fff; font-weight:700; }
  .tab.custom { border-color:#9c27b0; color:#6a1b9a; background:#f3e5f5; padding-right:6px; display:inline-flex; align-items:center; gap:4px; }
  .tab.custom:hover { background:#e1bee7; border-color:#6a1b9a; }
  .tab.custom.active { background:#7b1fa2; border-color:#7b1fa2; color:#fff; }
  .tab.custom .del-tab { font-size:0.75rem; opacity:0.5; line-height:1; padding:1px 3px; border-radius:3px; cursor:pointer; }
  .tab.custom .del-tab:hover { opacity:1; background:rgba(0,0,0,0.15); }
  /* + 추가 버튼 */
  .tab-add-btn {
    padding:5px 10px; border-radius:6px; border:1.5px dashed #90a4ae;
    background:transparent; color:#90a4ae; font-size:0.82rem; font-weight:700;
    cursor:pointer; font-family:inherit; transition:all .2s; white-space:nowrap;
  }
  .tab-add-btn:hover { border-color:var(--blue); color:var(--blue); background:#e3f2fd; }
  /* 인라인 입력 폼 */
  .tab-input-wrap { display:none; align-items:center; gap:4px; }
  .tab-input-wrap.show { display:inline-flex; }
  .tab-input-wrap input {
    padding:4px 10px; border-radius:6px; border:1.5px solid var(--blue);
    font-size:0.78rem; font-family:inherit; outline:none; width:120px; color:var(--text);
    background:#fff;
  }
  .tab-input-wrap button {
    padding:4px 10px; border-radius:6px; border:none; font-size:0.78rem;
    font-family:inherit; cursor:pointer; font-weight:700;
  }
  .tab-confirm { background:var(--blue); color:#fff; }
  .tab-cancel  { background:#e0e0e0; color:#555; }

  /* ── 그리드 ── */
  .grid-wrapper { padding: 20px 40px 60px; }
  .category-label {
    font-size:0.75rem; font-weight:800; letter-spacing:2px; text-transform:uppercase;
    color:#455a64; margin: 24px 0 10px;
    display:flex; align-items:center; gap:10px;
  }
  .category-label::after { content:''; flex:1; height:1.5px; background:#b0bec5; }

  .grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; }

  /* ── 카드 ── */
  .card {
    background:#fff; border:1.5px solid var(--border); border-radius:10px;
    padding:14px 16px; transition:all .2s; position:relative; overflow:hidden;
    display:flex; flex-direction:column; gap:8px;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    border-radius:10px 10px 0 0; opacity:1; transition:.2s;
  }
  .card:hover { border-color:#78909c; transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.14); }

  .card { --acc: #78909c; } /* 알 수 없는 카테고리 fallback */
  .card[data-cat="치과"]   { --acc:var(--teal); }
  .card[data-cat="AI교육"] { --acc:var(--blue2); }
  .card[data-cat="플랫폼"] { --acc:var(--purple); }
  .card[data-cat="선거"]   { --acc:var(--red); }
  .card[data-cat="미디어"] { --acc:var(--pink); }
  .card[data-cat="컨설팅"] { --acc:var(--orange); }
  .card[data-cat="도구"]   { --acc:var(--green); }
  .card::before { background: var(--acc); }

  .card-top { display:flex; align-items:flex-start; gap:10px; }
  .card-icon {
    width:34px; height:34px; border-radius:8px; display:flex; align-items:center;
    justify-content:center; font-size:1rem; flex-shrink:0;
    background: color-mix(in srgb, var(--acc) 15%, #f0f4f8);
    border: 1px solid color-mix(in srgb, var(--acc) 30%, #dde3ea);
  }
  .card-info { flex:1; min-width:0; }
  .card-num { font-size:0.75rem; color:#e65100; margin-bottom:1px; font-weight:800; letter-spacing:0.5px; }
  .card-name { font-size:0.87rem; font-weight:800; color:#0d1b2a; line-height:1.3;
               white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-desc { font-size:0.76rem; color:#37474f; line-height:1.5; font-weight:400;
               display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  .card-badges { display:flex; gap:4px; flex-wrap:wrap; }
  .badge {
    font-size:0.66rem; padding:2px 8px; border-radius:20px; font-weight:700;
    background: color-mix(in srgb, var(--acc) 15%, #fff);
    color: color-mix(in srgb, var(--acc) 100%, #000 20%);
    border: 1.5px solid color-mix(in srgb, var(--acc) 40%, transparent);
  }

  .card-actions { display:flex; gap:6px; margin-top:4px; }
  .btn-action {
    flex:1; padding:6px 8px; border-radius:6px; font-size:0.72rem; font-weight:700;
    cursor:pointer; text-align:center; text-decoration:none; font-family:inherit;
    border:1.5px solid #90a4ae; background:#f5f7fa; color:#37474f;
    transition:all .2s; display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .btn-action:hover { border-color:var(--acc); color:var(--acc); background:color-mix(in srgb, var(--acc) 8%, #fff); }
  .btn-action.primary { background:var(--blue); border-color:var(--blue); color:#fff; font-weight:700; }
  .btn-action.primary:hover { background:#1976d2; border-color:#1976d2; }
  .btn-action.sub-preview { background:#fff8e1; border-color:#f9a825; color:#e65100; font-weight:700; }
  .btn-action.sub-preview:hover { background:#fff3cd; border-color:#e65100; }

  /* ── 카드 타입 구분 ── */
  .card.type-direct { border-color:#81c784; border-width:2px; }
  .card.type-sub    { border-color:#ffb74d; border-width:2px; }

  .type-badge {
    display:inline-flex; align-items:center; gap:3px;
    font-size:0.65rem; font-weight:800; padding:2px 7px;
    border-radius:4px; margin-bottom:2px; letter-spacing:0.3px;
  }
  .type-badge.direct { background:#c8e6c9; color:#1b5e20; border:1.5px solid #66bb6a; }
  .type-badge.sub    { background:#fff9c4; color:#e65100; border:1.5px solid #ffb74d; }


  /* 복사 토스트 */
  #toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px);
    background:#0f172a; color:#fff; padding:10px 22px; border-radius:10px;
    font-size:0.85rem; border:1px solid #1e293b;
    transition:transform .3s ease; z-index:999;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
  }
  #toast.show { transform:translateX(-50%) translateY(0); }

  /* 검색 없음 */
  .empty { text-align:center; padding:60px 20px; color:var(--text2); display:none; }
  .empty svg { margin-bottom:16px; opacity:.3; }

  /* ── 프로젝트 추가 모달 ── */
  .modal-backdrop {
    display:none; position:fixed; inset:0; z-index:500;
    background:rgba(0,0,0,0.45); backdrop-filter:blur(3px);
    align-items:center; justify-content:center;
  }
  .modal-backdrop.show { display:flex; }
  .modal {
    background:#fff; border-radius:16px; padding:32px 36px;
    width:540px; max-width:94vw; max-height:90vh; overflow-y:auto;
    box-shadow:0 24px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size:1.1rem; font-weight:800; color:var(--text); margin-bottom:22px;
              display:flex; align-items:center; gap:10px; }
  .form-row { margin-bottom:16px; }
  .form-row label { display:block; font-size:0.78rem; font-weight:700;
                    color:var(--text2); margin-bottom:6px; letter-spacing:0.3px; }
  .form-row input, .form-row select, .form-row textarea {
    width:100%; padding:9px 12px; border:1.5px solid var(--border);
    border-radius:8px; font-size:0.88rem; font-family:inherit;
    color:var(--text); background:#fff; outline:none; transition:border .15s;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    border-color:var(--blue); box-shadow:0 0 0 3px rgba(21,101,192,0.1);
  }
  .form-row textarea { height:64px; resize:vertical; }
  .form-hint { font-size:0.72rem; color:#90a4ae; margin-top:4px; }
  .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .form-row-3 { display:grid; grid-template-columns:80px 1fr; gap:12px; margin-bottom:16px; }
  .modal-actions { display:flex; gap:10px; margin-top:24px; justify-content:flex-end; }
  .modal-actions button {
    padding:10px 24px; border-radius:8px; border:none;
    font-size:0.88rem; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .btn-modal-cancel { background:#f1f5f9; color:#64748b; }
  .btn-modal-cancel:hover { background:#e2e8f0; }
  .btn-modal-save { background:var(--blue); color:#fff; }
  .btn-modal-save:hover { background:#1976d2; }
  /* 추가 버튼 (헤더) */
  .btn-add-project {
    padding:4px 14px; border-radius:20px; border:1.5px solid rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.12); color:#fff; font-size:0.8rem;
    font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s;
  }
  .btn-add-project:hover { background:rgba(255,255,255,0.22); border-color:rgba(255,255,255,0.6); }
  /* 사용자 추가 카드 표시 */
  .card.user-card { border-style:dashed; border-color:#7986cb; }
  .card.user-card::after {
    content:'직접추가'; position:absolute; bottom:6px; right:8px;
    font-size:0.6rem; color:#9fa8da; font-weight:700; letter-spacing:0.5px;
  }
  .btn-del-proj {
    position:absolute; top:7px; right:7px; z-index:2;
    background:#fff0f0; border:1.5px solid #ef9a9a; color:#c62828;
    border-radius:5px; font-size:0.65rem; padding:2px 7px; cursor:pointer;
    font-weight:700; display:none; font-family:inherit; line-height:1.4;
  }
  .card.user-card:hover .btn-del-proj { display:block; }
  /* 카드 수정 버튼 */
  .btn-edit-card {
    position:absolute; top:7px; right:7px; z-index:2;
    background:#e3f2fd; border:1.5px solid #90caf9; color:#1565c0;
    border-radius:5px; font-size:0.65rem; padding:2px 7px; cursor:pointer;
    font-weight:700; display:none; font-family:inherit; line-height:1.4;
  }
  .card:hover .btn-edit-card { display:block; }
  /* 삭제 버튼 있는 user-card는 수정버튼 위치 조정 */
  .card.user-card .btn-edit-card { right:56px; }

  /* 추가 카테고리 체크박스 */
  .extra-cats-grid { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .extra-cat-label {
    display:inline-flex; align-items:center; gap:5px; padding:5px 10px;
    border:1.5px solid var(--border); border-radius:6px; cursor:pointer;
    font-size:0.8rem; background:#f8fafc; transition:all .15s; user-select:none;
  }
  .extra-cat-label:hover { border-color:var(--blue); background:#e3f2fd; }
  .extra-cat-label input[type=checkbox] { cursor:pointer; accent-color:var(--blue); }
  .extra-cat-label.checked { border-color:var(--blue); background:#dbeafe; color:var(--blue); font-weight:700; }

  /* ── 편집 모드 ── */
  .card.selectable { cursor:pointer; user-select:none; }
  .card.selectable:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.1); }
  .card.selectable .check-box {
    position:absolute; top:10px; right:10px;
    width:22px; height:22px; border-radius:50%;
    border:2px solid #90a4ae; background:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; transition:all .15s;
  }
  .card.selectable.selected .check-box {
    background:var(--blue); border-color:var(--blue); color:#fff;
  }
  .card.selectable.selected {
    border-color:var(--blue) !important;
    box-shadow:0 0 0 3px rgba(21,101,192,0.2) !important;
  }
  /* 편집 모드 안내 배너 */
  #editBar {
    position:fixed; bottom:0; left:0; right:0; z-index:150;
    background:#1565c0; color:#fff;
    padding:14px 40px; display:none;
    align-items:center; justify-content:space-between;
    box-shadow:0 -4px 20px rgba(0,0,0,0.18);
    font-size:0.9rem;
  }
  #editBar.show { display:flex; }
  #editBar strong { color:#ffd54f; }
  .edit-bar-btns { display:flex; gap:10px; }
  .edit-bar-btns button {
    padding:8px 22px; border-radius:8px; border:none;
    font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .btn-save   { background:#ffd54f; color:#1a237e; }
  .btn-save:hover { background:#ffca28; }
  .btn-cancel-edit { background:rgba(255,255,255,0.18); color:#fff; }
  .btn-cancel-edit:hover { background:rgba(255,255,255,0.3); }
  /* 편집 중 카드 액션 숨기기 */
  .edit-mode .card-actions { display:none; }
  .edit-mode .card { padding-bottom:14px; }
  /* 커스텀 탭 편집 아이콘 */
  .tab.custom .edit-tab { font-size:0.72rem; opacity:0.55; padding:1px 3px; border-radius:3px; }
  .tab.custom .edit-tab:hover { opacity:1; background:rgba(0,0,0,0.12); }

  /* 반응형 */
  @media(max-width:1400px) { .grid { grid-template-columns:repeat(4, 1fr); } }
  @media(max-width:1100px) { .grid { grid-template-columns:repeat(3, 1fr); } }
  @media(max-width:760px)  { .grid { grid-template-columns:repeat(2, 1fr); } }
  @media(max-width:640px) {
    .header, .toolbar, .grid-wrapper { padding-left:16px; padding-right:16px; }
    .grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>


<!-- ══════════ 헤더 ══════════ -->
<div class="header">
  <div class="header-top">
    <h1>🗂 <span>심재우</span> · AI 플랫폼 프로젝트 인덱스</h1>
    <div class="stat-chips">
      <div class="chip">전체 <b id="totalCount">0</b>개</div>
      <div class="chip">표시 <b id="showCount">0</b>개</div>
      <div class="chip">📁 C:\01 Claude-Code</div>
      <button class="btn-add-project" onclick="openAddModal()">＋ 프로젝트</button>
    </div>
  </div>
</div>

<!-- ══════════ 검색·필터 ══════════ -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="프로젝트 이름, 키워드로 검색…" oninput="filter()" onfocus="closeDd()">
    <button class="search-dd-btn" onclick="toggleDd(event)" title="목록에서 선택">▾</button>
    <div class="search-dropdown" id="searchDd"></div>
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-cat="전체" onclick="setTab(this)">전체</button>
    <button class="tab" data-cat="치과"   onclick="setTab(this)">🦷 치과/의료 <span class="edit-tab" onclick="enterEditMode(event,'치과')">✏️</span></button>
    <button class="tab" data-cat="AI교육" onclick="setTab(this)">📚 AI 교육 <span class="edit-tab" onclick="enterEditMode(event,'AI교육')">✏️</span></button>
    <button class="tab" data-cat="플랫폼" onclick="setTab(this)">⚙️ 플랫폼/앱 <span class="edit-tab" onclick="enterEditMode(event,'플랫폼')">✏️</span></button>
    <button class="tab" data-cat="선거"   onclick="setTab(this)">🗳 선거 <span class="edit-tab" onclick="enterEditMode(event,'선거')">✏️</span></button>
    <button class="tab" data-cat="미디어" onclick="setTab(this)">🎙 미디어 <span class="edit-tab" onclick="enterEditMode(event,'미디어')">✏️</span></button>
    <button class="tab" data-cat="컨설팅" onclick="setTab(this)">💼 컨설팅 <span class="edit-tab" onclick="enterEditMode(event,'컨설팅')">✏️</span></button>
    <button class="tab" data-cat="도구"   onclick="setTab(this)">🛠 도구 <span class="edit-tab" onclick="enterEditMode(event,'도구')">✏️</span></button>
    <!-- 커스텀 탭들이 여기에 추가됨 -->

let cardOverrides = JSON.parse(localStorage.getItem('cardOverrides')  || '{}');

// 마이그레이션: preview 경로 정규화 (절대경로 제거, 백슬래시 변환, .html 보정)
(function migratePreviewPaths() {
  let changed = false;
  userProjects = userProjects.map(p => {
    const fixed = normalizePreview(p.preview);
    if (fixed !== p.preview) { changed = true; return {...p, preview: fixed}; }
    return p;
  });
  if (changed) localStorage.setItem('userProjects', JSON.stringify(userProjects));
})();

function normalizePreview(preview) {
  if (!preview) return preview;
  // 따옴표 제거 (Windows 경로 복사 시 포함되는 경우)
  preview = preview.replace(/"/g, '').trim();
  // 절대 경로로 저장된 경우 ROOT 제거
  const rootVariants = [ROOT, 'C:\\01 Claude-Code\\', 'C:/01 Claude-Code/'];
  for (const r of rootVariants) {
    if (preview.startsWith(r)) { preview = preview.slice(r.length); break; }
  }
  // 백슬래시 → 슬래시
  preview = preview.replace(/\\/g, '/');
  // .html 없으면 /index.html 추가
  if (!preview.toLowerCase().endsWith('.html')) {
    preview = preview.replace(/\/+$/, '') + '/index.html';
  }
  return preview;
}

function getAllProjects() {
  const base = PROJECTS.map(p => cardOverrides[p.dir] ? {...p, ...cardOverrides[p.dir]} : p);
  const users = userProjects.map(p => {
    const fixed = normalizePreview(p.preview);
    return fixed !== p.preview ? {...p, preview: fixed} : p;
  });
  return [...base, ...users];
}

let activeTab = '전체';

function render(list) {
  const area = document.getElementById('cardArea');
  const empty = document.getElementById('empty');
  document.getElementById('showCount').textContent = list.length;

  if (!list.length) {
    const isCustom = activeTab.startsWith('__kw__');
    const kw = isCustom ? activeTab.replace('__kw__', '') : '';
    if (isCustom && !editMode) {
      area.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text2);">
        <div style="font-size:2rem;margin-bottom:16px;">📂</div>
        <p style="font-size:0.95rem;margin-bottom:16px;"><strong>${kw}</strong> 카테고리에 카드가 없습니다.</p>
        <button onclick="enterEditMode(event,'${kw.replace(/'/g,"\\'")}');this.blur()"
          style="padding:10px 24px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:inherit;">
          + 카드 추가하기
        </button></div>`;
      empty.style.display = 'none';
    } else {
      area.innerHTML = '';
      empty.style.display = 'block';
    }
    return;
  }
  empty.style.display = 'none';

  // 카테고리별 그룹
  const cats = [...new Set(list.map(p => p.cat))];
  const builtInIcon = { 치과:'🦷', AI교육:'📚', 플랫폼:'⚙️', 선거:'🗳', 미디어:'🎙', 컨설팅:'💼', 도구:'🛠' };
  // 커스텀 탭은 🔖 아이콘 fallback
  const catIcon = cat => builtInIcon[cat] || '🔖';

  area.innerHTML = cats.map(cat => {
    const items = list.filter(p => p.cat === cat);
    return `
    <div class="category-label">${catIcon(cat)} ${cat} <span style="color:var(--text2);font-size:0.7rem;font-weight:400;margin-left:4px;">${items.length}개</span></div>
    <div class="grid">${items.map(card).join('')}</div>`;
  }).join('');
}

function card(p) {
  // data-dir 속성으로 경로 전달 → onclick에 직접 삽입 시 백슬래시 escape 문제 완전 방지
  const dirAttr     = p.dir.replace(/"/g, '&quot;');
  const previewHref = p.preview ? 'file:///' + ROOT.replace(/\\/g, '/') + p.preview.replace(/\\/g, '/') : '';
  const typeClass   = p.preview ? (p.sub ? 'type-sub' : 'type-direct') : '';
  const typeBadge   = p.preview
    ? (p.sub
        ? `<div class="type-badge sub">📂 서브폴더</div>`
        : `<div class="type-badge direct">⚡ 직접연결</div>`)
    : '';
  const previewBtnClass = p.sub ? 'btn-action sub-preview' : 'btn-action primary';

  // 편집 모드
  const isSelected  = editMode && selectedDirs.has(p.dir);
  const selectClass = editMode ? ` selectable${isSelected ? ' selected' : ''}` : '';
  const selectAttr  = editMode ? `onclick="toggleSelect(this)"` : '';
  const checkBox    = editMode ? `<div class="check-box">${isSelected ? '✓' : ''}</div>` : '';

  const delBtn  = p.isUserAdded && !editMode
    ? `<button class="btn-del-proj"  onclick="deleteUserProject(this)">✕ 삭제</button>`
    : '';
  const editBtn = !editMode
    ? `<button class="btn-edit-card" onclick="openEditModal(event,this)">✏️ 수정</button>`
    : '';
  const userClass = p.isUserAdded ? ' user-card' : '';

  return `
  <div class="card ${typeClass}${selectClass}${userClass}" data-dir="${dirAttr}" data-cat="${p.cat}" data-name="${p.name}" data-tags="${p.tags.join(' ')}" ${selectAttr}>
    ${checkBox}${delBtn}${editBtn}
    <div class="card-top">
      <div class="card-icon">${p.icon}</div>
      <div class="card-info">
        <div class="card-num">#${p.num}</div>
        ${typeBadge}
        <div class="card-name" title="${p.name}">${p.name}</div>
      </div>
    </div>
    <div class="card-desc">${p.desc}</div>
    <div class="card-badges">${p.tags.map(t=>`<span class="badge">${t}</span>`).join('')}</div>
    <div class="card-actions">
      <button class="btn-action" onclick="copyPath(this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        경로 복사
      </button>
      <button class="btn-action" onclick="openFolder(this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        폴더 열기
      </button>
      ${previewHref ? `<a class="${previewBtnClass}" href="${previewHref}" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        미리보기
      </a>` : ''}
    </div>
  </div>`;
}

// 탭 키 추출 (내장: 'AI교육', 커스텀: '__kw__라디오카페' → '라디오카페')
function tabKey(tab) {
  return tab.startsWith('__kw__') ? tab.replace('__kw__', '') : tab;
}
function isBuiltIn(tab) {
  return !tab.startsWith('__kw__') && tab !== '전체';
}

function filter() {
  // 편집 모드: 전체 카드 표시
  if (editMode) { render(getAllProjects()); return; }

  const q = document.getElementById('search').value.toLowerCase();
  let list = getAllProjects();

  if (activeTab !== '전체') {
    const key = tabKey(activeTab);
    const assigned = customTabCards[key];

    if (assigned && assigned.length > 0) {
      // 커스텀 지정 카드 + extraCats + 해당 cat을 기본으로 갖는 카드
      list = list.filter(p => assigned.includes(p.dir) || (p.extraCats||[]).includes(key) || p.cat === key);
    } else if (isBuiltIn(activeTab)) {
      // 내장 탭: cat 필터 + extraCats
      list = list.filter(p => p.cat === activeTab || (p.extraCats||[]).includes(activeTab));
    } else {
      // 커스텀 탭: cat이 이 탭인 카드 + extraCats
      list = list.filter(p => p.cat === key || (p.extraCats||[]).includes(key));
    }
  }

  if (q) list = list.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.desc.toLowerCase().includes(q) ||
    p.tags.join(' ').toLowerCase().includes(q) ||
    p.dir.toLowerCase().includes(q)
  );
  render(list);
}

function setTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeTab = el.dataset.cat;
  document.getElementById('search').value = '';
  filter();
}

let selectedDirs   = new Set();

function renderCustomTabs() {
  const wrap = document.getElementById('customTabs');
  wrap.innerHTML = customTabs.map(kw => {
    const count = (customTabCards[kw] || []).length;
    return `
    <button class="tab custom" data-cat="__kw__${kw}" onclick="setTab(this)">
      🔖 ${kw}${count ? ` <span style="opacity:.65;font-weight:400">(${count})</span>` : ''}
      <span class="edit-tab" onclick="enterEditMode(event,'${kw.replace(/'/g,"\\'")}')">✏️</span>
      <span class="del-tab" onclick="deleteTab(event,'${kw.replace(/'/g,"\\'")}')">✕</span>
    </button>`;
  }).join('');
}

function enterEditMode(e, key) {
  e.stopPropagation();
  editMode  = true;
  editingKw = key;

  // 저장된 커스텀 지정이 있으면 그걸 로드, 없으면 기본값으로 pre-select
  const existing = customTabCards[key];
  if (existing && existing.length > 0) {
    selectedDirs = new Set(existing);
  } else if (isBuiltIn('__dummy__') || ['치과','AI교육','플랫폼','선거','미디어','컨설팅','도구'].includes(key)) {
    // 내장 탭: 해당 cat의 카드를 기본으로 선택
    selectedDirs = new Set(getAllProjects().filter(p => p.cat === key).map(p => p.dir));
  } else {
    selectedDirs = new Set();
  }

  // 해당 탭을 active로
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const builtInTab = document.querySelector(`.tab[data-cat="${key}"]`);
  const customTabEl = document.querySelector(`.tab[data-cat="__kw__${key}"]`);
  if (builtInTab) { builtInTab.classList.add('active'); activeTab = key; }
  else if (customTabEl) { customTabEl.classList.add('active'); activeTab = '__kw__' + key; }

  document.getElementById('editTabLabel').textContent = key;
  document.getElementById('editSelCount').textContent  = selectedDirs.size;
  document.getElementById('editBar').classList.add('show');
  document.getElementById('cardArea').classList.add('edit-mode');

  // 내장 탭은 "기본값 복원" 버튼 표시
  const isBuiltInTab = ['치과','AI교육','플랫폼','선거','미디어','컨설팅','도구'].includes(key);
  document.getElementById('resetBtn').style.display = isBuiltInTab ? '' : 'none';

  filter();
}

function resetEdit() {
  // 커스텀 지정 삭제 → 기본 cat 필터로 복원
  delete customTabCards[editingKw];
  localStorage.setItem('customTabCards', JSON.stringify(customTabCards));
  exitEditMode();
  renderCustomTabs();
  showToast('🔄 기본값으로 복원되었습니다');
}

function toggleSelect(el) {
  const dir = el.closest ? el.closest('.card').dataset.dir : el.dataset.dir;
  if (selectedDirs.has(dir)) selectedDirs.delete(dir);
  else selectedDirs.add(dir);
  document.getElementById('editSelCount').textContent = selectedDirs.size;
  filter();
}

function saveEdit() {
  customTabCards[editingKw] = [...selectedDirs];
  localStorage.setItem('customTabCards', JSON.stringify(customTabCards));
  exitEditMode();
  renderCustomTabs();
  showToast('✅ 저장되었습니다');
}

function cancelEdit() { exitEditMode(); }

function exitEditMode() {
  editMode = false;
  editingKw = '';
  selectedDirs = new Set();
  document.getElementById('editBar').classList.remove('show');
  document.getElementById('cardArea').classList.remove('edit-mode');
  filter();
}

function showTabInput() {
  document.getElementById('tabAddBtn').style.display = 'none';
  const w = document.getElementById('tabInputWrap');
  w.classList.add('show');
  document.getElementById('tabInput').value = '';
  document.getElementById('tabInput').focus();
}

function confirmTab() {
  const val = document.getElementById('tabInput').value.trim();
  if (val && !customTabs.includes(val)) {
    customTabs.push(val);
    localStorage.setItem('customTabs', JSON.stringify(customTabs));
    renderCustomTabs();
  }
  cancelTab();
}

function cancelTab() {
  document.getElementById('tabInputWrap').classList.remove('show');
  document.getElementById('tabAddBtn').style.display = '';
}

function deleteTab(e, kw) {
  e.stopPropagation();
  customTabs = customTabs.filter(t => t !== kw);
  localStorage.setItem('customTabs', JSON.stringify(customTabs));
  if (activeTab === '__kw__' + kw) { activeTab = '전체'; document.querySelector('.tab[data-cat="전체"]').classList.add('active'); filter(); }
  renderCustomTabs();
}

renderCustomTabs();

function copyPath(el) {
  const dir  = el.closest('.card').dataset.dir;
  const path = ROOT + dir;
  navigator.clipboard.writeText(path).then(() => showToast('📋 경로가 클립보드에 복사되었습니다'));
}

function openFolder(el) {
  const dir  = el.closest('.card').dataset.dir;
  const path = ROOT + dir;
  navigator.clipboard.writeText(path).then(() => showToast('📋 경로가 클립보드에 복사되었습니다'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Toolbar sticky top (헤더 높이에 맞춤) ──────────────
function fixToolbarTop() {
  const h = document.querySelector('.header').offsetHeight;
  document.querySelector('.toolbar').style.top = h + 'px';
}
fixToolbarTop();
window.addEventListener('resize', fixToolbarTop);

// ── 검색 드롭다운 ──────────────────────────────────────
const PINNED = [
  { label:'🍺 케르비시아',  kw:'케르비시아' },
  { label:'📻 라디오카페',  kw:'라디오카페' },
];

function toggleDd(e) {
  e.stopPropagation();
  const dd = document.getElementById('searchDd');
  if (dd.classList.contains('show')) { dd.classList.remove('show'); return; }

  // 즐겨찾기 섹션
  const pinnedHtml = `<div class="dd-section">
    <div class="dd-section-title">⭐ 즐겨찾기</div>
    ${PINNED.map(p => `<div class="dd-item pinned" onclick="selectKw('${p.kw}')">
      <span class="dd-num">🔖</span>${p.label}
    </div>`).join('')}
  </div>`;

  // 커스텀 탭 섹션 (사용자 추가 탭)
  const customTabsHtml = customTabs.length ? `<div class="dd-section">
    <div class="dd-section-title">🔖 내 카테고리</div>
    ${customTabs.map(kw => `<div class="dd-item pinned" onclick="selectCustomTab('${kw.replace(/'/g,"\\'")}')">
      <span class="dd-num">🗂</span>${kw}
    </div>`).join('')}
  </div>` : '';

  // 카테고리별 그룹핑
  const allProjs = getAllProjects();
  const cats = [...new Set(allProjs.map(p => p.cat))];
  const catIcon = { 치과:'🦷', AI교육:'📚', 플랫폼:'⚙️', 선거:'🗳', 미디어:'🎙', 컨설팅:'💼', 도구:'🛠' };
  const catsHtml = cats.map(cat => {
    const items = allProjs.filter(p => p.cat === cat);
    return `<div class="dd-section">
      <div class="dd-section-title">${catIcon[cat]||''} ${cat}</div>
      ${items.map(p => `<div class="dd-item" onclick="selectKw('${p.name.replace(/'/g,"\\'")}')">
        <span class="dd-num">#${p.num}</span>${p.name}
      </div>`).join('')}
    </div>`;
  }).join('');

  dd.innerHTML = pinnedHtml + customTabsHtml + catsHtml;
  dd.classList.add('show');
}

function selectCustomTab(kw) {
  // 해당 커스텀 탭을 활성화
  const tabEl = document.querySelector(`.tab[data-cat="__kw__${kw}"]`);
  if (tabEl) { setTab(tabEl); }
  else { document.getElementById('search').value = kw; filter(); }
  document.getElementById('searchDd').classList.remove('show');
}

function selectKw(name) {
  document.getElementById('search').value = name;
  filter();
  document.getElementById('searchDd').classList.remove('show');
}

function closeDd() {
  document.getElementById('searchDd').classList.remove('show');
}

document.addEventListener('click', closeDd);

// ── 카테고리 드롭다운 공통 헬퍼 ──────────────────────────────────
function populateCatSelect(selectEl, currentVal) {
  const builtIn = CAT_LIST.map(c =>
    `<option value="${c.key}"${currentVal === c.key ? ' selected' : ''}>${c.icon} ${c.key}</option>`
  ).join('');

  const custom = customTabs.length
    ? `<optgroup label="─── 내 카테고리 ───">` +
        customTabs.map(kw =>
          `<option value="${kw}"${currentVal === kw ? ' selected' : ''}>🔖 ${kw}</option>`
        ).join('') +
      `</optgroup>`
    : '';

  selectEl.innerHTML = builtIn + custom;
}

// ── 새 프로젝트 추가 모달 ────────────────────────────────────────
const CAT_LIST = [
  { key:'치과',   icon:'🦷' },
  { key:'AI교육', icon:'📚' },
  { key:'플랫폼', icon:'⚙️' },
  { key:'선거',   icon:'🗳' },
  { key:'미디어', icon:'🎙' },
  { key:'컨설팅', icon:'💼' },
  { key:'도구',   icon:'🛠' },
];

function openAddModal() {
  // 기본 카테고리 드롭다운에 커스텀 탭 추가
  populateCatSelect(document.getElementById('mCat'), '치과');

  // 추가 카테고리 체크박스 렌더: 기본 7개 + 사용자 추가 탭
  const ec = document.getElementById('mExtraCats');
  const builtInHtml = CAT_LIST.map(c =>
    `<label class="extra-cat-label">
       <input type="checkbox" value="${c.key}" onchange="syncPrimaryCheck()"> ${c.icon} ${c.key}
     </label>`
  ).join('');
  const customHtml = customTabs.length
    ? customTabs.map(kw =>
        `<label class="extra-cat-label" style="border-color:#9c27b0;color:#6a1b9a;">
           <input type="checkbox" value="__kw__${kw}" onchange="updateCustomCatLabel(this)"> 🔖 ${kw}
         </label>`
      ).join('')
    : '';
  ec.innerHTML = builtInHtml + customHtml;
  syncPrimaryCheck();
  document.getElementById('addModal').classList.add('show');
  document.getElementById('mPath').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
  ['mPath','mName','mNum','mDesc','mTags','mPreview'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const ic = document.getElementById('mIcon');
  if (ic) ic.value = '📁';
  document.querySelectorAll('#mExtraCats input').forEach(cb => cb.checked = false);
}

function syncPrimaryCheck() {
  const primary = document.getElementById('mCat').value;
  document.querySelectorAll('#mExtraCats input').forEach(cb => {
    const lbl = cb.closest('.extra-cat-label');
    if (cb.value === primary) {
      cb.checked = false; cb.disabled = true;
      lbl.style.opacity = '0.4'; lbl.style.cursor = 'not-allowed';
    } else {
      cb.disabled = false;
      lbl.style.opacity = ''; lbl.style.cursor = '';
    }
    lbl.classList.toggle('checked', cb.checked);
  });
}

function updateCustomCatLabel(cb) {
  cb.closest('.extra-cat-label').classList.toggle('checked', cb.checked);
}

function autoFillFromPath(val) {
  let folder = val.replace(/"/g, '').trim();  // 따옴표 제거
  if (folder.startsWith(ROOT)) folder = folder.slice(ROOT.length);
  const prefix = 'C:\\01 Claude-Code\\';
  if (folder.startsWith(prefix)) folder = folder.slice(prefix.length);
  const prefixFwd = 'C:/01 Claude-Code/';
  if (folder.startsWith(prefixFwd)) folder = folder.slice(prefixFwd.length);
  folder = folder.replace(/[\\\/]+$/, '');
  if (!folder) return;

  // 번호 + 이름 자동 분리: "52 새프로젝트" → num=52, name=새프로젝트
  const m = folder.match(/^([\d\-\.]+)\s+(.*)/);
  if (m) {
    if (!document.getElementById('mNum').value)  document.getElementById('mNum').value  = m[1];
    if (!document.getElementById('mName').value) document.getElementById('mName').value = m[2];
  } else {
    if (!document.getElementById('mName').value) document.getElementById('mName').value = folder;
  }
  // 미리보기 경로 기본값
  if (!document.getElementById('mPreview').value)
    document.getElementById('mPreview').value = folder + '/index.html';
}

function autoCompletePreview(el) {
  let val = el.value.trim();
  if (!val) return;
  if (val.toLowerCase().endsWith('.html')) return;
  // .html로 끝나지 않으면 항상 /index.html 추가 (끝 슬래시 정리 후)
  el.value = val.replace(/[\\\/]+$/, '') + '/index.html';
}

function saveNewProject() {
  let pathVal = document.getElementById('mPath').value.trim();
  let dir = pathVal;
  if (dir.startsWith(ROOT)) dir = dir.slice(ROOT.length);
  const prefix = 'C:\\01 Claude-Code\\';
  if (dir.startsWith(prefix)) dir = dir.slice(prefix.length);
  dir = dir.replace(/[\\\/]+$/, '');

  const name = document.getElementById('mName').value.trim();
  if (!dir || !name) { showToast('⚠️ 경로와 이름을 입력하세요'); return; }

  const primaryCat = document.getElementById('mCat').value;
  const allChecked = [...document.querySelectorAll('#mExtraCats input:checked')].map(c => c.value);
  // 기본 카테고리(built-in)와 커스텀 탭(__kw__...) 분리
  const extraCats      = allChecked.filter(v => !v.startsWith('__kw__'));
  const extraCustomKws = allChecked.filter(v => v.startsWith('__kw__')).map(v => v.replace('__kw__', ''));
  const tagsRaw    = document.getElementById('mTags').value.trim();
  const tags       = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const previewVal = document.getElementById('mPreview').value.trim();

  // 서브폴더 여부 자동 감지 (경로에 / 포함되면 sub:true)
  const isSub = previewVal.includes('/') && !previewVal.startsWith(dir + '/index.html');

  const newProj = {
    num:        document.getElementById('mNum').value.trim() || '?',
    cat:        primaryCat,
    extraCats:  extraCats,   // built-in 중복 카테고리
    icon:       document.getElementById('mIcon').value.trim() || '📁',
    name:       name,
    dir:        dir,
    desc:       document.getElementById('mDesc').value.trim() || '',
    tags:       tags,
    preview:    previewVal || '',
    sub:        isSub,
    isUserAdded: true,
  };

  // 중복 dir 제거 후 추가
  userProjects = userProjects.filter(p => p.dir !== newProj.dir);
  userProjects.push(newProj);
  localStorage.setItem('userProjects', JSON.stringify(userProjects));

  // 커스텀 탭에 선택된 경우 → customTabCards에 자동 등록
  extraCustomKws.forEach(kw => {
    if (!customTabCards[kw]) customTabCards[kw] = [];
    if (!customTabCards[kw].includes(dir)) customTabCards[kw].push(dir);
  });
  localStorage.setItem('customTabCards', JSON.stringify(customTabCards));

  closeAddModal();
  document.getElementById('totalCount').textContent = getAllProjects().length;
  renderCustomTabs(); // 드롭다운 갱신용
  filter();
  showToast('✅ 프로젝트가 추가되었습니다');
}

function deleteUserProject(el) {
  const dir = el.closest('.card').dataset.dir;
  if (!confirm('이 프로젝트를 삭제하시겠습니까?')) return;
  userProjects = userProjects.filter(p => p.dir !== dir);
  localStorage.setItem('userProjects', JSON.stringify(userProjects));
  document.getElementById('totalCount').textContent = getAllProjects().length;
  filter();
  showToast('🗑 프로젝트가 삭제되었습니다');
}

// ── 카드 수정 모달 ────────────────────────────────────────────────
function openEditModal(e, el) {
  e.stopPropagation();
  const dir = (typeof el === 'string') ? el : el.closest('.card').dataset.dir;
  const p = getAllProjects().find(x => x.dir === dir);
  if (!p) return;

  document.getElementById('eMIcon').value    = p.icon || '📁';
  document.getElementById('eMName').value    = p.name || '';
  document.getElementById('eMNum').value     = p.num  || '';
  document.getElementById('eMDesc').value    = p.desc || '';
  document.getElementById('eMTags').value    = (p.tags || []).join(', ');
  document.getElementById('eMPreview').value = p.preview || '';
  document.getElementById('eMDir').value     = p.dir;
  document.getElementById('eMIsUser').value  = p.isUserAdded ? '1' : '0';

  // 카테고리 선택 (커스텀 탭 포함)
  const catSel = document.getElementById('eMCat');
  populateCatSelect(catSel, p.cat || '치과');

  // 추가 카테고리 체크박스
  const ec = document.getElementById('eMExtraCats');
  const extraCats = p.extraCats || [];
  ec.innerHTML = CAT_LIST.map(c =>
    `<label class="extra-cat-label${extraCats.includes(c.key) ? ' checked' : ''}">
       <input type="checkbox" value="${c.key}" ${extraCats.includes(c.key) ? 'checked' : ''}
         onchange="this.closest('.extra-cat-label').classList.toggle('checked',this.checked)">
       ${c.icon} ${c.key}
     </label>`
  ).join('') + (customTabs.length ? customTabs.map(kw => {
    const ck = extraCats.includes('__kw__' + kw);
    return `<label class="extra-cat-label${ck ? ' checked' : ''}" style="border-color:#9c27b0;color:#6a1b9a;">
      <input type="checkbox" value="__kw__${kw}" ${ck ? 'checked' : ''}
        onchange="this.closest('.extra-cat-label').classList.toggle('checked',this.checked)">
      🔖 ${kw}</label>`;
  }).join('') : '');

  // 기본 카테고리 = 현재 cat → 비활성화
  ec.querySelectorAll('input').forEach(cb => {
    if (cb.value === p.cat) { cb.checked = false; cb.disabled = true; cb.closest('.extra-cat-label').style.opacity = '0.4'; }
  });

  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
}

function saveEditCard() {
  const dir    = document.getElementById('eMDir').value;
  const isUser = document.getElementById('eMIsUser').value === '1';

  const updated = {
    dir:     dir,
    icon:    document.getElementById('eMIcon').value.trim()    || '📁',
    name:    document.getElementById('eMName').value.trim(),
    num:     document.getElementById('eMNum').value.trim()     || '?',
    cat:     document.getElementById('eMCat').value,
    desc:    document.getElementById('eMDesc').value.trim(),
    tags:    document.getElementById('eMTags').value.split(',').map(t => t.trim()).filter(Boolean),
    preview: document.getElementById('eMPreview').value.trim(),
  };

  // 추가 카테고리
  const allChecked = [...document.querySelectorAll('#eMExtraCats input:checked')].map(c => c.value);
  updated.extraCats     = allChecked.filter(v => !v.startsWith('__kw__'));
  const extraCustomKws  = allChecked.filter(v => v.startsWith('__kw__')).map(v => v.replace('__kw__',''));

  // sub 자동 판별
  updated.sub = updated.preview.includes('/') &&
                !updated.preview.startsWith(updated.dir + '/index.html');

  if (isUser) {
    // 사용자 추가 카드 → userProjects 수정
    updated.isUserAdded = true;
    userProjects = userProjects.map(p => p.dir === dir ? {...p, ...updated} : p);
    localStorage.setItem('userProjects', JSON.stringify(userProjects));
  } else {
    // 기본 카드 → 오버라이드 저장 (별도 localStorage)
    cardOverrides[dir] = updated;
    localStorage.setItem('cardOverrides', JSON.stringify(cardOverrides));
  }

  // 커스텀 탭 등록
  extraCustomKws.forEach(kw => {
    if (!customTabCards[kw]) customTabCards[kw] = [];
    if (!customTabCards[kw].includes(dir)) customTabCards[kw].push(dir);
  });
  localStorage.setItem('customTabCards', JSON.stringify(customTabCards));

  closeEditModal();
  document.getElementById('totalCount').textContent = getAllProjects().length;
  filter();
  showToast('✅ 수정되었습니다');
}

// 초기 렌더
document.getElementById('totalCount').textContent = getAllProjects().length;
filter();
