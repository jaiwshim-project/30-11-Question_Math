<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{font-family:'Noto Sans KR',sans-serif;}
body{background:#EDEEFF;background-image:radial-gradient(ellipse 80% 60% at 0% 0%,rgba(79,70,229,.08) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 100% 100%,rgba(124,58,237,.07) 0%,transparent 55%);min-height:100vh;}
.gradient-bg{background:linear-gradient(135deg,#0d0820 0%,#1a0d3e 60%,#0d0515 100%);}
.fade-in{animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-overlay{background:rgba(15,10,40,.65);backdrop-filter:blur(8px);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:linear-gradient(#4F46E5,#7C3AED);border-radius:3px;}
nav{box-shadow:0 4px 24px rgba(79,70,229,.4)!important;border-bottom:none!important;}

/* Match */
.match-card{transition:all .2s;cursor:pointer;border:2px solid rgba(99,91,255,.2);background:white;}
.match-card.selected{border-color:#4F46E5!important;background:#EEF2FF!important;transform:scale(1.04);box-shadow:0 0 0 3px rgba(79,70,229,.25);}
.match-card.matched{border-color:#10B981!important;background:#D1FAE5!important;opacity:.6;pointer-events:none;}
.match-card.wrong{border-color:#EF4444!important;background:#FEE2E2!important;animation:shake .35s ease;}

/* Shake */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Particle */
.particle{position:fixed;pointer-events:none;font-size:1.4rem;animation:particleFall 2.2s ease forwards;z-index:9999;}
@keyframes particleFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* XP */
.xp-fill{background:linear-gradient(90deg,#4F46E5,#7C3AED,#EC4899);transition:width .7s ease;}

/* Stars */
.star-anim{animation:starPop .4s ease;}
@keyframes starPop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="shared.js"></script>
<script>
// ═══ STATE ════════════════════════════════════════════
let currentMatchGrade = 1;

// ─── XP / Stars ───────────────────────────────────────
function getXP()      { return parseInt(localStorage.getItem('qmath_xp') || '0'); }
function calcLevel(x) { return Math.floor(x / 200) + 1; }
function totalStars() {
  const s = JSON.parse(localStorage.getItem('qmath_stars') || '{}');
  return Object.values(s).reduce((a,b)=>a+b, 0);
}
function addXP(amount) {
  localStorage.setItem('qmath_xp', getXP() + amount);
  renderXPBar();
}
function renderXPBar() {
  const xp  = getXP();
  const lvl = calcLevel(xp);
  const pct = ((xp % 200) / 200) * 100;
  document.getElementById('xp-level').textContent    = lvl;
  document.getElementById('xp-val').textContent      = xp + ' XP';
  document.getElementById('xp-fill').style.width     = pct + '%';
  document.getElementById('total-stars').textContent = totalStars();
}

// ─── Stars HTML ───────────────────────────────────────
function starsHTML(n) {
  return [1,2,3].map(i =>
    `<span class="text-3xl star-anim" style="animation-delay:${(i-1)*.15}s">${i<=n?'⭐':'☆'}</span>`
  ).join('');
}

// ─── Particles ────────────────────────────────────────
function launchParticles(count, emojis) {
  const arr = Array.isArray(emojis) ? emojis : [emojis];
  for (let i=0; i<count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = arr[Math.floor(Math.random()*arr.length)];
    el.style.left  = (Math.random()*95) + 'vw';
    el.style.top   = '-40px';
    el.style.animationDuration = (1.2 + Math.random()*1.2) + 's';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2800);
  }
}

// ─── Helpers ──────────────────────────────────────────
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }

// ─── History display ──────────────────────────────────
function updateHistory() {
  const fs = JSON.parse(localStorage.getItem('qmath_flashcard_scores')||'[]');
  const ms = JSON.parse(localStorage.getItem('qmath_match_scores')||'[]');
  const qs = JSON.parse(localStorage.getItem('qmath_quiz_scores')||'[]');
  const fl = fs.length ? fs[fs.length-1] : null;
  const ml = ms.length ? ms[ms.length-1] : null;
  const ql = qs.length ? qs[qs.length-1] : null;
  document.getElementById('hist-flash').innerHTML = fl ? `${fl.grade}학년 ⭐${fl.stars}` : '기록 없음';
  document.getElementById('hist-match').innerHTML = ml ? `${ml.grade}학년 ${ml.time}초 ⭐${ml.stars}` : '기록 없음';
  document.getElementById('hist-quiz').innerHTML  = ql ? `${ql.grade}학년 ${ql.score}점 ⭐${ql.stars}` : '기록 없음';
}

// ═══════════════════════════════════════════════════════
// MATCH GAME
// ═══════════════════════════════════════════════════════
let matchPairs=[], matchSel=null, matchMatched=0, matchErrors=0;
let matchTimerInterval=null, matchStartTime=0;

function startMatch(grade) {
  currentMatchGrade = grade;
  const pool = CONCEPTS.filter(c=>c.grade==grade).sort(()=>Math.random()-.5).slice(0,6);
  matchPairs = pool.map(c=>({ id:c.id, title:c.title, desc:c.desc.length>28 ? c.desc.substring(0,28)+'…' : c.desc }));
  matchSel=null; matchMatched=0; matchErrors=0; matchStartTime=Date.now();

  show('match-play'); hide('match-result');
  document.getElementById('match-left').textContent   = matchPairs.length;
  document.getElementById('match-errors').textContent = '0';

  clearInterval(matchTimerInterval);
  matchTimerInterval = setInterval(()=>{
    document.getElementById('match-time').textContent = Math.floor((Date.now()-matchStartTime)/1000);
  }, 500);

  renderMatchGrid();
}

function renderMatchGrid() {
  const cards = [
    ...matchPairs.map(p=>({ id:p.id, text:p.title, side:'title' })),
    ...matchPairs.map(p=>({ id:p.id, text:p.desc,  side:'desc'  }))
  ].sort(()=>Math.random()-.5);

  document.getElementById('match-grid').innerHTML = cards.map((c,i)=>`
    <button onclick="matchClick(${i})" data-idx="${i}" data-id="${c.id}" data-side="${c.side}"
      class="match-card rounded-xl p-3 text-xs font-medium text-gray-700 leading-snug text-left min-h-[60px] flex items-center shadow-sm">
      ${c.text}
    </button>
  `).join('');
}

function matchClick(idx) {
  const btn = document.querySelector(`[data-idx="${idx}"]`);
  if(!btn || btn.classList.contains('matched')) return;

  if(!matchSel) {
    matchSel = { idx, id:btn.dataset.id, side:btn.dataset.side };
    btn.classList.add('selected');
    return;
  }

  const prev = document.querySelector(`[data-idx="${matchSel.idx}"]`);

  if(matchSel.idx === idx) {           // same card
    prev.classList.remove('selected');
    matchSel = null;
    return;
  }

  if(matchSel.id===btn.dataset.id && matchSel.side!==btn.dataset.side) {
    prev.classList.remove('selected'); prev.classList.add('matched');
    btn.classList.add('matched');
    matchMatched++;
    document.getElementById('match-left').textContent = matchPairs.length - matchMatched;
    matchSel = null;
    if(matchMatched===matchPairs.length) { clearInterval(matchTimerInterval); setTimeout(endMatch,400); }
  } else {
    matchErrors++;
    document.getElementById('match-errors').textContent = matchErrors;
    btn.classList.add('wrong'); prev.classList.add('wrong');
    setTimeout(()=>{ btn.classList.remove('wrong','selected'); prev.classList.remove('wrong','selected'); matchSel=null; }, 650);
  }
}

function endMatch() {
  const elapsed = Math.floor((Date.now()-matchStartTime)/1000);
  const stars = (elapsed<=20 && matchErrors<=1) ? 3 : (elapsed<=45 && matchErrors<=3) ? 2 : 1;
  const xp    = stars * 60;
  addXP(xp);
  const arr = JSON.parse(localStorage.getItem('qmath_match_scores')||'[]');
  arr.push({ grade:currentMatchGrade, time:elapsed, errors:matchErrors, stars, xp, date:Date.now() });
  localStorage.setItem('qmath_match_scores', JSON.stringify(arr));
  updateHistory();
  dbSaveScore({ gameType:'match', grade:currentMatchGrade, stars, xp, timeSec:elapsed, errors:matchErrors });
  showLeaderboard('match', currentMatchGrade, 'match-lb', 'match-lb-list');

  hide('match-play'); show('match-result');
  document.getElementById('mr-emoji').textContent  = stars===3?'🏆':stars===2?'🎉':'😊';
  document.getElementById('mr-desc').textContent   = `${elapsed}초 완료! 실수 ${matchErrors}번`;
  document.getElementById('mr-stars').innerHTML    = starsHTML(stars);
  document.getElementById('mr-xp').textContent     = '+'+xp+' XP';
  if(stars===3) launchParticles(25,['🌟','⭐','🎊']);
  else if(stars>=2) launchParticles(12,'⭐');
}

function stopMatch() {
  clearInterval(matchTimerInterval);
  hide('match-play');
  hide('match-result');
  window.location.href = 'game.html';
}

async function showLeaderboard(gameType, grade, wrapperId, listId) {
  const lb = await dbGetLeaderboard(gameType, grade);
  if (!lb.length) return;
  document.getElementById(wrapperId).classList.remove('hidden');
  const user = getUser();
  document.getElementById(listId).innerHTML = lb.map((r, i) => {
    const isMe = user && r.user_name === user.name;
    const val  = gameType === 'match' ? r.time_sec + '초' : r.score + '점';
    return `<div class="flex items-center gap-2 text-xs py-1 px-2 rounded-lg ${isMe ? 'bg-indigo-100 font-bold' : ''}">
      <span class="w-5 text-center font-black ${i===0?'text-yellow-500':i===1?'text-gray-400':i===2?'text-amber-600':'text-gray-400'}">${['🥇','🥈','🥉'][i]||i+1}</span>
      <span class="flex-1 text-gray-700">${r.user_name || '익명'}</span>
      <span class="text-indigo-600 font-bold">${gameType==='flash'?r.correct+'개':val}</span>
      <span class="text-yellow-500">${'⭐'.repeat(r.stars)}</span>
    </div>`;
  }).join('');
}

// ─── Init ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', ()=>{
  renderXPBar();
  updateHistory();

  const pending = localStorage.getItem('qmath_game_start');
  if (pending) {
    localStorage.removeItem('qmath_game_start');
    const { grade } = JSON.parse(pending);
    startMatch(grade);
  }
});
</script>
