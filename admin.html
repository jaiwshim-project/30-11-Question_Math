<script>
const TYPE_COLORS = {
  '개념':'bg-blue-100 text-blue-700','정의':'bg-purple-100 text-purple-700',
  '구조':'bg-green-100 text-green-700','적용':'bg-amber-100 text-amber-700',
  '계산':'bg-red-100 text-red-700',   '사고':'bg-pink-100 text-pink-700'
};
const LEVEL_COLORS = {'A+':'text-purple-600','A':'text-blue-600','B+':'text-green-600','B':'text-green-500','C':'text-amber-500','D':'text-red-500'};

// ── State ──────────────────────────────────────────────
let questionDB = [...QUESTION_DB_DEFAULT];
let studentDB  = [...STUDENTS];

function getStoredDB() {
  const q = localStorage.getItem('qmath_question_db');
  const s = localStorage.getItem('qmath_student_db');
  if(q) questionDB = JSON.parse(q);
  if(s) studentDB  = JSON.parse(s);
}
function saveDB() {
  localStorage.setItem('qmath_question_db', JSON.stringify(questionDB));
  localStorage.setItem('qmath_student_db',  JSON.stringify(studentDB));
}

// ── Tabs ──────────────────────────────────────────────
function switchTab(tab) {
  ['questions','students','concepts'].forEach(t => {
    document.getElementById('panel-'+t).classList.add('hidden');
    const btn = document.getElementById('tab-'+t);
    if(btn) btn.className = 'bg-white border-2 border-indigo-200 text-gray-600 px-5 py-2.5 rounded-xl text-sm font-medium hover:border-primary hover:text-primary transition';
  });
  document.getElementById('panel-'+tab).classList.remove('hidden');
  const activeBtn = document.getElementById('tab-'+tab);
  if(activeBtn) activeBtn.className = 'tab-active px-5 py-2.5 rounded-xl text-sm font-medium transition';
  if(tab==='concepts') renderConceptsPanel();
}

// ── Questions ─────────────────────────────────────────
function filterQuestions() {
  const search = (document.getElementById('q-search')?.value||'').toLowerCase();
  const type   = document.getElementById('q-type-filter')?.value||'';
  const filtered = questionDB.filter(q =>
    (!search || q.q.toLowerCase().includes(search)) &&
    (!type || q.type === type)
  );
  renderQTable(filtered);
}

function renderQTable(list) {
  const tbody = document.getElementById('q-tbody');
  document.getElementById('q-count-label').textContent = `총 ${list.length}개 질문`;
  if(!list.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">질문이 없습니다.</td></tr>'; return; }
  tbody.innerHTML = list.map((q,i)=>`
    <tr class="${i%2===0 ? 'bg-white' : 'bg-indigo-50/30'} hover:bg-indigo-50 transition">
      <td class="px-5 py-3 text-sm text-gray-700 max-w-xs truncate">${q.q}</td>
      <td class="px-5 py-3"><span class="type-badge ${TYPE_COLORS[q.type]||'bg-gray-100 text-gray-600'}">${q.type}</span></td>
      <td class="px-5 py-3 text-sm text-gray-500 whitespace-nowrap">${q.grade}</td>
      <td class="px-5 py-3 text-sm text-gray-500">${q.topic}</td>
      <td class="px-5 py-3 text-right"><button onclick="deleteQuestion(${questionDB.indexOf(q)})" class="text-xs bg-gradient-to-r from-red-500 to-rose-500 text-white px-2.5 py-1 rounded-lg font-medium hover:shadow-md transition">삭제</button></td>
    </tr>
  `).join('');
}

function addQuestion() {
  const q = document.getElementById('new-q-text').value.trim();
  if(!q) { alert('질문을 입력하세요.'); return; }
  questionDB.unshift({
    q,
    type:  document.getElementById('new-q-type').value,
    grade: document.getElementById('new-q-grade').value,
    topic: document.getElementById('new-q-topic').value,
    hint:  document.getElementById('new-q-hint').value
  });
  saveDB();
  filterQuestions();
  updateStats();
  hideModal('addQModal');
  document.getElementById('new-q-text').value = '';
  document.getElementById('new-q-hint').value = '';
}

function deleteQuestion(i) {
  if(!confirm('삭제하시겠습니까?')) return;
  questionDB.splice(i,1);
  saveDB();
  filterQuestions();
  updateStats();
}

// ── Students ──────────────────────────────────────────
function filterStudents() {
  const search = (document.getElementById('s-search')?.value||'').toLowerCase();
  const filtered = studentDB.filter(s => !search || s.name.toLowerCase().includes(search));
  renderSTable(filtered);
}

function renderSTable(list) {
  const tbody = document.getElementById('s-tbody');
  if(!list.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">학생이 없습니다.</td></tr>'; return; }
  tbody.innerHTML = list.map((s,i) => `
    <tr class="${i%2===0 ? 'bg-white' : 'bg-indigo-50/30'} hover:bg-indigo-50 transition">
      <td class="px-5 py-3 text-sm font-medium text-gray-800">${s.name}</td>
      <td class="px-5 py-3 text-sm text-gray-500">${s.grade}</td>
      <td class="px-5 py-3 text-sm font-bold ${LEVEL_COLORS[s.level]||''}">${s.level}</td>
      <td class="px-5 py-3">
        <div class="flex items-center gap-2">
          <div class="w-20 bg-gray-100 rounded-full h-1.5"><div class="h-1.5 rounded-full bg-gradient-to-r from-primary to-secondary" style="width:${s.progress}%"></div></div>
          <span class="text-xs text-gray-500">${s.progress}%</span>
        </div>
      </td>
      <td class="px-5 py-3 text-sm text-gray-500">${s.last}</td>
      <td class="px-5 py-3 text-right"><button onclick="deleteStudent(${studentDB.indexOf(s)})" class="text-xs bg-gradient-to-r from-red-500 to-rose-500 text-white px-2.5 py-1 rounded-lg font-medium hover:shadow-md transition">삭제</button></td>
    </tr>
  `).join('');
}

function addStudent() {
  const name = document.getElementById('new-s-name').value.trim();
  if(!name) { alert('이름을 입력하세요.'); return; }
  studentDB.push({
    name,
    grade: document.getElementById('new-s-grade').value,
    level: '-', progress: 0, last: new Date().toISOString().split('T')[0]
  });
  saveDB();
  filterStudents();
  updateStats();
  hideModal('addStudentModal');
  document.getElementById('new-s-name').value = '';
}

function deleteStudent(i) {
  if(!confirm(studentDB[i].name + '님을 삭제하시겠습니까?')) return;
  studentDB.splice(i,1);
  saveDB();
  filterStudents();
  updateStats();
}

// ── Concepts Panel ────────────────────────────────────
function renderConceptsPanel() {
  const panel = document.getElementById('panel-concepts').querySelector('.grid');
  panel.innerHTML = CONCEPTS.map(c => `
    <div class="bg-white rounded-2xl p-5 shadow-sm border-2 border-indigo-200 border-t-4 border-t-indigo-400 hover:shadow-md transition">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 bg-indigo-100 rounded-xl border border-indigo-200 flex items-center justify-center text-xl">${c.icon}</div>
        <div><div class="font-bold text-sm">${c.title}</div><div class="text-xs text-gray-500">${c.grade}학년 · ${c.topic}</div></div>
      </div>
      <div class="text-xs text-gray-600 mb-2">${c.desc}</div>
      <div class="text-xs text-gray-500">질문 ${c.questions.length}개</div>
    </div>
  `).join('');
}

// ── Stats ─────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-questions').textContent = questionDB.length;
  document.getElementById('stat-students').textContent  = studentDB.length;
  const tests = JSON.parse(localStorage.getItem('qmath_test_results')||'[]');
  document.getElementById('stat-tests').textContent = tests.length;
}

// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  getStoredDB();
  filterQuestions();
  filterStudents();
  updateStats();
});
</script>
